<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sei invitata - Festa di laurea di cbes</title>
  <style>
    :root {
      --pink: #f2178a;
      --wine: #72123d;
      --cream: #fff5fb;
      --gold: #ffd43b;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      overflow-x: hidden;
      color: var(--wine);
      font-family: "Trebuchet MS", "Arial Rounded MT Bold", system-ui, sans-serif;
      background-color: #f95bab;
      background-image: url("sfondo-glitter.jpeg"), url("assets/sfondo-glitter.jpeg");
      background-position: center;
      background-size: cover;
      background-attachment: fixed;
    }

    main {
      width: min(980px, calc(100% - 24px));
      min-height: 100vh;
      margin: auto;
      padding: 22px 0 34px;
      display: grid;
      place-items: center;
    }

    .hero {
      width: 100%;
      text-align: center;
    }

    .arc {
      width: min(820px, 100%);
      height: auto;
      margin: 0 auto -18px;
      overflow: visible;
    }

    .arc text {
      fill: #fff;
      stroke: #171016;
      stroke-width: 5px;
      paint-order: stroke fill;
      stroke-linejoin: round;
      font-size: 82px;
      font-weight: 900;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .collage {
      position: relative;
      width: min(760px, calc(100% - 20px));
      aspect-ratio: 4 / 5;
      margin: 0 auto 26px;
    }

    .photo {
      position: absolute;
      object-fit: cover;
      border: 7px solid var(--cream);
      border-radius: 8px;
      box-shadow: 0 18px 45px rgba(91, 5, 48, .35);
    }

    .photo.main {
      inset: 8% 8% 5%;
      width: 84%;
      height: 87%;
      transform: rotate(-2deg);
      object-position: center;
    }

    .photo.one,
    .photo.two,
    .photo.three {
      width: 31%;
      aspect-ratio: 1;
    }

    .photo.one {
      right: 0;
      top: 3%;
      transform: rotate(8deg);
    }

    .photo.two {
      right: 0;
      bottom: 2%;
      transform: rotate(-7deg);
    }

    .photo.three {
      left: 0;
      top: 0;
      transform: rotate(-8deg);
    }

    .cap {
      position: absolute;
      left: 2%;
      bottom: 2%;
      z-index: 3;
      font-size: clamp(3.4rem, 9vw, 6.5rem);
      transform: rotate(-14deg);
      filter: drop-shadow(0 8px 6px rgba(91, 5, 48, .25));
    }

    .next-button {
      display: inline-flex;
      min-height: 58px;
      align-items: center;
      justify-content: center;
      border: 0;
      border-radius: 8px;
      padding: 15px 25px;
      color: white;
      background: var(--pink);
      box-shadow: 0 10px 0 #aa0d5d, 0 18px 34px rgba(91, 5, 48, .3);
      font: 900 1.15rem/1 system-ui, sans-serif;
      text-decoration: none;
      text-transform: uppercase;
      cursor: pointer;
    }

    .next-button::after { content: " ✨"; }

    .click-star {
      position: fixed;
      z-index: 50;
      pointer-events: none;
      font-size: 30px;
      animation: pop .75s ease-out forwards;
    }

    @keyframes pop {
      from { opacity: 0; transform: translate(-50%, -20%) scale(.3) rotate(0); }
      30% { opacity: 1; }
      to { opacity: 0; transform: translate(-50%, -160%) scale(1.5) rotate(22deg); }
    }

    @media (max-width: 600px) {
      body {
        background-attachment: scroll;
      }

      main { padding-top: 14px; }

      .arc {
        margin-bottom: -6px;
      }

      .arc text {
        font-size: 72px;
      }

      .collage {
        width: 100%;
        aspect-ratio: 4 / 5.4;
      }

      .photo {
        border-width: 5px;
      }

      .photo.main {
        inset: 10% 7% 5%;
        width: 86%;
        height: 85%;
      }

      .photo.one,
      .photo.two,
      .photo.three {
        width: 36%;
      }
    }
  </style>
  <script>
    function loadNextPhoto(image) {
      const fallbacks = JSON.parse(image.dataset.fallbacks || "[]");
      const next = fallbacks.shift();
      image.dataset.fallbacks = JSON.stringify(fallbacks);
      if (next) {
        image.src = next;
      } else {
        image.onerror = null;
      }
    }
  </script>
</head>
<body>
  <main>
    <section class="hero">
      <svg class="arc" viewBox="0 0 900 260" role="img" aria-label="Sei invitata alla festa di laurea di cbes">
        <defs>
          <path id="inviteArcTop" d="M 90 120 Q 450 20 810 120"></path>
          <path id="inviteArcBottom" d="M 145 225 Q 450 115 755 225"></path>
        </defs>
        <text>
          <textPath href="#inviteArcTop" startOffset="50%" text-anchor="middle">Allarme laurea</textPath>
        </text>
        <text>
          <textPath href="#inviteArcBottom" startOffset="50%" text-anchor="middle">Sei convocata!</textPath>
        </text>
      </svg>

      <div class="collage">
        <img class="photo main" src="muletto.jpeg" onerror="this.onerror=null;this.src='assets/muletto.jpeg'" alt="Cbes sul muletto">
        <img class="photo one" src="aperitivo.jpeg" onerror="this.onerror=null;this.src='assets/aperitivo.jpeg'" alt="Cbes all'aperitivo">
        <img class="photo two" src="faccia.jpeg" onerror="this.onerror=null;this.src='assets/faccia.jpeg'" alt="Foto buffa di cbes">
        <img class="photo three" src="neve.jpeg" data-fallbacks='["neve.png","assets/neve.jpeg","assets/neve.png"]' onerror="loadNextPhoto(this)" alt="Cbes sulla neve">
        <span class="cap" aria-hidden="true">🎓</span>
      </div>

      <a class="next-button" id="nextButton" href="info.html">Avanti</a>
    </section>
  </main>

  <script>
    const button = document.querySelector("#nextButton");

    function burstStars() {
      const rect = button.getBoundingClientRect();
      const points = [
        [rect.left + 10, rect.top],
        [rect.left + rect.width / 2, rect.top - 4],
        [rect.right - 8, rect.top],
        [rect.left + rect.width * .3, rect.bottom]
      ];

      points.forEach(([left, top], index) => {
        const star = document.createElement("span");
        star.className = "click-star";
        star.textContent = index % 2 ? "⭐" : "✨";
        star.style.left = `${left}px`;
        star.style.top = `${top}px`;
        star.style.animationDelay = `${index * 55}ms`;
        document.body.appendChild(star);
        star.addEventListener("animationend", () => star.remove());
      });
    }

    button.addEventListener("click", (event) => {
      event.preventDefault();
      burstStars();
      window.setTimeout(() => {
        window.location.href = button.href;
      }, 520);
    });
  </script>
</body>
</html>
