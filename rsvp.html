<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ci sei? - Festa di laurea di cbes</title>
  <style>
    :root {
      --pink: #f2178a;
      --wine: #72123d;
      --cream: #fff5fb;
      --gold: #ffd43b;
      --green: #19875d;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--wine);
      font-family: "Trebuchet MS", "Arial Rounded MT Bold", system-ui, sans-serif;
      background-color: #f95bab;
      background-image: url("sfondo-glitter.jpeg?v=4"), url("assets/sfondo-glitter.jpeg?v=4");
      background-position: center;
      background-size: cover;
      background-attachment: fixed;
    }

    main {
      width: min(680px, calc(100% - 24px));
      min-height: 100vh;
      margin: auto;
      padding: 26px 0;
      display: grid;
      place-items: center;
    }

    .rsvp {
      width: 100%;
      padding: clamp(24px, 6vw, 48px);
      border: 5px solid rgba(255,255,255,.9);
      border-radius: 8px;
      background: rgba(255, 241, 249, .9);
      box-shadow: 0 24px 60px rgba(91, 5, 48, .34);
      text-align: center;
      backdrop-filter: blur(5px);
    }

    h1 {
      margin: 0 0 24px;
      color: var(--pink);
      font-size: clamp(3.2rem, 14vw, 6.8rem);
      line-height: .92;
      letter-spacing: 0;
      text-transform: uppercase;
      text-shadow: 3px 3px 0 white;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 900;
      text-align: left;
      text-transform: uppercase;
    }

    input,
    textarea {
      width: 100%;
      border: 3px solid rgba(242, 23, 138, .38);
      border-radius: 8px;
      padding: 14px;
      color: var(--wine);
      background: rgba(255,255,255,.78);
      font: 1rem/1.4 system-ui, sans-serif;
      outline: none;
    }

    input {
      min-height: 54px;
    }

    textarea {
      min-height: 135px;
      resize: vertical;
    }

    input:focus,
    textarea:focus {
      border-color: var(--pink);
      box-shadow: 0 0 0 4px rgba(242, 23, 138, .13);
    }

    .choices {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 24px;
    }

    button {
      min-height: 58px;
      border: 0;
      border-radius: 8px;
      padding: 15px 20px;
      color: white;
      background: var(--pink);
      box-shadow: 0 9px 0 #aa0d5d, 0 16px 28px rgba(91, 5, 48, .25);
      font: 900 1rem/1 system-ui, sans-serif;
      text-transform: uppercase;
      cursor: pointer;
    }

    button:disabled {
      opacity: .65;
      cursor: wait;
    }

    .yes-button {
      background: var(--green);
      box-shadow: 0 9px 0 #086044, 0 16px 28px rgba(91, 5, 48, .25);
    }

    .calendar-button {
      color: var(--wine);
      background: var(--gold);
      box-shadow: 0 9px 0 #d49e07, 0 16px 28px rgba(91, 5, 48, .25);
    }

    .panel {
      display: none;
      gap: 16px;
      margin-top: 28px;
      padding-top: 24px;
      border-top: 3px dashed rgba(242, 23, 138, .28);
    }

    .panel.active { display: grid; }
    .hidden { display: none !important; }

    .love {
      margin: 0;
      color: var(--pink);
      font-size: clamp(3.3rem, 14vw, 6rem);
      font-weight: 900;
      line-height: 1;
      text-transform: uppercase;
      text-shadow: 3px 3px 0 white;
    }

    .message {
      margin: 0;
      font-size: clamp(1.05rem, 3.8vw, 1.3rem);
      line-height: 1.4;
    }

    .error {
      display: none;
      margin: 18px 0 0;
      color: #a10043;
      font-weight: 800;
    }

    .error.active { display: block; }

    @media (max-width: 520px) {
      body { background-attachment: scroll; }
      .rsvp { padding: 24px 16px 32px; }
      .choices { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <section class="rsvp">
      <h1>Ci sei? 👀</h1>

      <form id="rsvpForm" action="https://formspree.io/f/mldzeydz" method="POST">
        <input type="hidden" name="evento" value="Festa di laurea di cbes - 19 luglio 2026">
        <input type="hidden" id="answerInput" name="partecipazione" value="">

        <div id="identity">
          <label for="guestName">Prima dimmi chi sei</label>
          <input id="guestName" name="nome" type="text" placeholder="Nome e cognome" required>
        </div>

        <div class="choices" id="choices">
          <button class="yes-button" type="button" id="yesButton">Sì, ovvio</button>
          <button type="button" id="noButton">No, purtroppo</button>
        </div>

        <div class="panel" id="yesPanel">
          <p class="love">Tvb 🥹💗</p>
          <p class="message">Segnati la data che poi te la dimentichi e mi spezzi il cuore.</p>
          <button class="calendar-button" type="button" id="calendarButton">Aggiungi al calendario</button>
        </div>

        <div class="panel" id="noPanel">
          <p class="message">Nooo dai 😭 dimmi almeno perché, così posso giudicarti in pace.</p>
          <label for="reason">Motivo ufficiale</label>
          <textarea id="reason" name="motivo" placeholder="Scrivi qui la tua giustificazione..." required></textarea>
          <button type="submit" id="sendNoButton">Invia il dramma</button>
        </div>

        <p class="error" id="errorMessage">Non riesco a inviare la risposta. Riprova tra poco.</p>
      </form>
    </section>
  </main>

  <script>
    const FORMSPREE_ENDPOINT = "https://formspree.io/f/mldzeydz";
    const form = document.querySelector("#rsvpForm");
    const guestName = document.querySelector("#guestName");
    const answerInput = document.querySelector("#answerInput");
    const choices = document.querySelector("#choices");
    const identity = document.querySelector("#identity");
    const yesButton = document.querySelector("#yesButton");
    const noButton = document.querySelector("#noButton");
    const yesPanel = document.querySelector("#yesPanel");
    const noPanel = document.querySelector("#noPanel");
    const errorMessage = document.querySelector("#errorMessage");

    function nameIsValid() {
      if (!guestName.checkValidity()) {
        guestName.reportValidity();
        return false;
      }
      return true;
    }

    async function sendRsvp(answer) {
      answerInput.value = answer;
      const response = await fetch(FORMSPREE_ENDPOINT, {
        method: "POST",
        body: new FormData(form),
        headers: { Accept: "application/json" }
      });

      if (!response.ok) throw new Error("Invio non riuscito");
    }

    yesButton.addEventListener("click", async () => {
      if (!nameIsValid()) return;
      errorMessage.classList.remove("active");
      yesButton.disabled = true;
      yesButton.textContent = "Invio...";

      try {
        await sendRsvp("Sì");
        identity.classList.add("hidden");
        choices.classList.add("hidden");
        noPanel.classList.remove("active");
        yesPanel.classList.add("active");
      } catch (error) {
        yesButton.disabled = false;
        yesButton.textContent = "Sì, ovvio";
        errorMessage.classList.add("active");
      }
    });

    noButton.addEventListener("click", () => {
      if (!nameIsValid()) return;
      choices.classList.add("hidden");
      noPanel.classList.add("active");
      document.querySelector("#reason").focus();
    });

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      if (!nameIsValid()) return;
      errorMessage.classList.remove("active");
      const sendButton = document.querySelector("#sendNoButton");
      sendButton.disabled = true;
      sendButton.textContent = "Invio...";

      try {
        await sendRsvp("No");
        identity.classList.add("hidden");
        noPanel.innerHTML = '<p class="love">Ricevuto 💔</p><p class="message">La tua giustificazione è arrivata. Verrà giudicata con severità.</p>';
      } catch (error) {
        sendButton.disabled = false;
        sendButton.textContent = "Invia il dramma";
        errorMessage.classList.add("active");
      }
    });

    document.querySelector("#calendarButton").addEventListener("click", () => {
      const ics = [
        "BEGIN:VCALENDAR",
        "VERSION:2.0",
        "PRODID:-//cbes laurea//festa//IT",
        "CALSCALE:GREGORIAN",
        "BEGIN:VEVENT",
        `UID:${Date.now()}@cbes-laurea`,
        `DTSTAMP:${new Date().toISOString().replace(/[-:]/g, "").split(".")[0]}Z`,
        "DTSTART;TZID=Europe/Rome:20260719T192000",
        "DTEND;TZID=Europe/Rome:20260719T233000",
        "SUMMARY:Festa di laurea di cbes",
        "LOCATION:Da Bass\\, via Piacenza 13",
        "DESCRIPTION:Aperitivo con drink\\, cose buone da mangiare e torta finale.",
        "END:VEVENT",
        "END:VCALENDAR"
      ].join("\r\n");

      const blob = new Blob([ics], { type: "text/calendar;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "festa-laurea-cbes.ics";
      document.body.appendChild(link);
      link.click();
      link.remove();
      window.setTimeout(() => URL.revokeObjectURL(url), 1000);
    });
  </script>
</body>
</html>
